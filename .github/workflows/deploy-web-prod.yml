name: Deploy Web to Production

on:
  push:
    branches: [main]
    paths:
      - 'apps/mobile/**'
      - 'packages/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/deploy-web-prod.yml'
  workflow_dispatch:

concurrency:
  group: deploy-web-prod
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to schlaubox.expo.app
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
          packager: npm

      - name: Install dependencies
        run: npm ci

      - name: Deploy web app
        working-directory: apps/mobile
        run: npm run web:deploy
